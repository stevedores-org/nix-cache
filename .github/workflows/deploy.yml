name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Type Check
        run: bunx tsc --noEmit

      - name: Test
        run: bun test

      - name: Deploy to Cloudflare
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
